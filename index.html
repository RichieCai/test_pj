<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台積電股價分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        /* 上方 TITLE */
        .header {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: #fff;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 主要內容區 */
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* 左側 MENU */
        .menu {
            width: 220px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 16px 0;
            flex-shrink: 0;
        }

        .menu-item {
            padding: 12px 24px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 15px;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: #e8eaf6;
        }

        .menu-item.active {
            background: #e8eaf6;
            border-left-color: #1a237e;
            font-weight: 600;
            color: #1a237e;
        }

        /* 右側 BODY */
        .body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* 卡片 */
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1a237e;
        }

        /* 摘要資訊 */
        .summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .summary-item {
            background: #fff;
            border-radius: 8px;
            padding: 20px 24px;
            flex: 1;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .summary-item .label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .summary-item .value {
            font-size: 28px;
            font-weight: 700;
        }

        .summary-item .change {
            font-size: 14px;
            margin-top: 4px;
        }

        .up { color: #e53935; }
        .down { color: #43a047; }

        /* 圖表 */
        .chart-container {
            position: relative;
            height: 400px;
        }

        /* 表格 */
        .stock-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .stock-table th {
            background: #f5f5f5;
            padding: 10px 12px;
            text-align: right;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
        }

        .stock-table th:first-child {
            text-align: left;
        }

        .stock-table td {
            padding: 8px 12px;
            text-align: right;
            border-bottom: 1px solid #f0f0f0;
        }

        .stock-table td:first-child {
            text-align: left;
        }

        .stock-table tr:hover {
            background: #fafafa;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
            font-size: 16px;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e53935;
        }
    </style>
</head>
<body>
    <!-- 上方 TITLE -->
    <div class="header">
        <h1>台積電 (2330.TW) 股價分析</h1>
        <span class="subtitle" id="dateRange"></span>
    </div>

    <div class="container">
        <!-- 左側 MENU -->
        <div class="menu">
            <div class="menu-item active" data-view="chart">趨勢圖</div>
            <div class="menu-item" data-view="table">每日股價</div>
        </div>

        <!-- 右側 BODY -->
        <div class="body">
            <div class="loading" id="loading">正在載入台積電股價資料...</div>

            <!-- 摘要資訊 -->
            <div class="summary" id="summary" style="display:none;">
                <div class="summary-item">
                    <div class="label">最近收盤價</div>
                    <div class="value" id="lastClose">-</div>
                    <div class="change" id="lastChange">-</div>
                </div>
                <div class="summary-item">
                    <div class="label">三個月最高價</div>
                    <div class="value" id="highPrice">-</div>
                    <div class="change" id="highDate">-</div>
                </div>
                <div class="summary-item">
                    <div class="label">三個月最低價</div>
                    <div class="value" id="lowPrice">-</div>
                    <div class="change" id="lowDate">-</div>
                </div>
                <div class="summary-item">
                    <div class="label">平均成交量</div>
                    <div class="value" id="avgVolume">-</div>
                    <div class="change">&nbsp;</div>
                </div>
            </div>

            <!-- 趨勢圖 -->
            <div class="card" id="chartView" style="display:none;">
                <h2>股價趨勢圖</h2>
                <div class="chart-container">
                    <canvas id="stockChart"></canvas>
                </div>
            </div>

            <!-- 每日股價表格 -->
            <div class="card" id="tableView" style="display:none;">
                <h2>每日股價明細</h2>
                <div style="max-height: 500px; overflow-y: auto;">
                    <table class="stock-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>開盤價</th>
                                <th>最高價</th>
                                <th>最低價</th>
                                <th>收盤價</th>
                                <th>成交量</th>
                                <th>漲跌</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let stockData = [];
        let chart = null;
        let currentView = 'chart';

        // Menu 切換
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentView = item.dataset.view;
                updateView();
            });
        });

        function updateView() {
            document.getElementById('chartView').style.display = currentView === 'chart' ? 'block' : 'none';
            document.getElementById('tableView').style.display = currentView === 'table' ? 'block' : 'none';
        }

        // 從 Yahoo Finance 取得資料
        async function fetchStockData() {
            const now = Math.floor(Date.now() / 1000);
            const threeMonthsAgo = now - 90 * 24 * 60 * 60;
            const symbol = '2330.TW';
            const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${threeMonthsAgo}&period2=${now}&interval=1d`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API 請求失敗');
                const data = await response.json();
                const result = data.chart.result[0];
                const timestamps = result.timestamp;
                const quotes = result.indicators.quote[0];

                stockData = timestamps.map((ts, i) => ({
                    date: new Date(ts * 1000),
                    open: quotes.open[i],
                    high: quotes.high[i],
                    low: quotes.low[i],
                    close: quotes.close[i],
                    volume: quotes.volume[i]
                })).filter(d => d.close !== null);

                renderAll();
            } catch (err) {
                // 如果 Yahoo Finance API 被 CORS 阻擋，使用模擬資料
                console.warn('無法取得即時資料，使用模擬資料展示:', err.message);
                generateDemoData();
                renderAll();
            }
        }

        // 產生模擬資料（當 API 不可用時）
        function generateDemoData() {
            stockData = [];
            const today = new Date();
            let price = 1050;
            for (let i = 90; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                if (d.getDay() === 0 || d.getDay() === 6) continue;

                const change = (Math.random() - 0.48) * 30;
                const open = price;
                price = Math.max(800, Math.min(1300, price + change));
                const close = Math.round(price * 10) / 10;
                const high = Math.round(Math.max(open, close) * (1 + Math.random() * 0.015) * 10) / 10;
                const low = Math.round(Math.min(open, close) * (1 - Math.random() * 0.015) * 10) / 10;
                const volume = Math.floor(15000000 + Math.random() * 25000000);

                stockData.push({
                    date: d,
                    open: Math.round(open * 10) / 10,
                    high, low, close, volume
                });
            }
        }

        function formatDate(d) {
            return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatNumber(n) {
            if (n === null || n === undefined) return '-';
            return n.toLocaleString('zh-TW', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        }

        function formatVolume(v) {
            if (v >= 100000000) return (v / 100000000).toFixed(2) + ' 億';
            if (v >= 10000) return (v / 10000).toFixed(0) + ' 萬';
            return v.toLocaleString();
        }

        function renderAll() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('summary').style.display = 'flex';
            updateView();

            // 日期範圍
            const first = stockData[0];
            const last = stockData[stockData.length - 1];
            document.getElementById('dateRange').textContent =
                `${formatDate(first.date)} ~ ${formatDate(last.date)}`;

            // 摘要
            const prevClose = stockData.length > 1 ? stockData[stockData.length - 2].close : last.close;
            const change = last.close - prevClose;
            const changePercent = (change / prevClose * 100);
            const changeClass = change >= 0 ? 'up' : 'down';
            const changeSign = change >= 0 ? '+' : '';

            document.getElementById('lastClose').textContent = formatNumber(last.close);
            document.getElementById('lastChange').innerHTML =
                `<span class="${changeClass}">${changeSign}${formatNumber(change)} (${changeSign}${changePercent.toFixed(2)}%)</span>`;

            // 最高 / 最低
            let maxHigh = { price: 0, date: null };
            let minLow = { price: Infinity, date: null };
            let totalVolume = 0;

            stockData.forEach(d => {
                if (d.high > maxHigh.price) { maxHigh.price = d.high; maxHigh.date = d.date; }
                if (d.low < minLow.price) { minLow.price = d.low; minLow.date = d.date; }
                totalVolume += d.volume;
            });

            document.getElementById('highPrice').textContent = formatNumber(maxHigh.price);
            document.getElementById('highDate').textContent = formatDate(maxHigh.date);
            document.getElementById('lowPrice').textContent = formatNumber(minLow.price);
            document.getElementById('lowDate').textContent = formatDate(minLow.date);
            document.getElementById('avgVolume').textContent = formatVolume(Math.floor(totalVolume / stockData.length));

            renderChart();
            renderTable();
        }

        function renderChart() {
            const ctx = document.getElementById('stockChart').getContext('2d');
            if (chart) chart.destroy();

            const labels = stockData.map(d => formatDate(d.date));
            const closes = stockData.map(d => d.close);
            const volumes = stockData.map(d => d.volume);

            chart = new Chart(ctx, {
                data: {
                    labels,
                    datasets: [
                        {
                            type: 'line',
                            label: '收盤價',
                            data: closes,
                            borderColor: '#1a237e',
                            backgroundColor: 'rgba(26, 35, 126, 0.08)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            borderWidth: 2,
                            yAxisID: 'y'
                        },
                        {
                            type: 'bar',
                            label: '成交量',
                            data: volumes,
                            backgroundColor: stockData.map((d, i) =>
                                i > 0 && d.close >= stockData[i - 1].close
                                    ? 'rgba(229, 57, 53, 0.3)'
                                    : 'rgba(67, 160, 71, 0.3)'
                            ),
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxTicksLimit: 12,
                                font: { size: 11 }
                            }
                        },
                        y: {
                            position: 'left',
                            title: { display: true, text: '股價 (TWD)' },
                            ticks: { font: { size: 11 } }
                        },
                        y1: {
                            position: 'right',
                            title: { display: true, text: '成交量' },
                            grid: { drawOnChartArea: false },
                            ticks: {
                                font: { size: 11 },
                                callback: v => formatVolume(v)
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    if (ctx.datasetIndex === 0) return `收盤價: ${formatNumber(ctx.raw)}`;
                                    return `成交量: ${formatVolume(ctx.raw)}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const reversed = [...stockData].reverse();
            tbody.innerHTML = reversed.map((d, i) => {
                const prev = i < reversed.length - 1 ? reversed[i + 1].close : d.open;
                const change = d.close - prev;
                const pct = (change / prev * 100);
                const cls = change >= 0 ? 'up' : 'down';
                const sign = change >= 0 ? '+' : '';
                return `<tr>
                    <td>${formatDate(d.date)}</td>
                    <td>${formatNumber(d.open)}</td>
                    <td>${formatNumber(d.high)}</td>
                    <td>${formatNumber(d.low)}</td>
                    <td><strong>${formatNumber(d.close)}</strong></td>
                    <td>${formatVolume(d.volume)}</td>
                    <td class="${cls}">${sign}${formatNumber(change)} (${sign}${pct.toFixed(2)}%)</td>
                </tr>`;
            }).join('');
        }

        // 啟動
        fetchStockData();
    </script>
</body>
</html>
